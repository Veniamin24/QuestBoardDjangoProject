{% extends 'base.html' %}

{% block content %}

<div class="card shadow p-4">

    <h2>{{ hero.name }}</h2>

    <p><strong>Class:</strong> {{ hero.hero_class }}</p>
    <p><strong>Level:</strong> {{ hero.level }}</p>
    <p><strong>Guild:</strong> {{ hero.guild }}</p>

    <div class="mt-3">
        <a href="{% url 'hero-edit' hero.pk %}" class="btn btn-warning">
            Edit
        </a>

        <a href="{% url 'hero-delete' hero.pk %}" class="btn btn-danger">
            Delete
        </a>
    </div>

</div>

{% endblock %}
